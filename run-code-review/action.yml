name: "Review Code"
description: "Runs an AI-powered code review using Claude Code with Bitwarden plugins"
inputs:
  azure_subscription_id:
    description: "Azure Subscription ID for OIDC authentication"
    required: true
  azure_tenant_id:
    description: "Azure Tenant ID for OIDC authentication"
    required: true
  azure_client_id:
    description: "Azure Client ID for OIDC authentication"
    required: true
  pr_number:
    description: "Pull request number to review"
    required: true
  repository:
    description: "Repository in owner/repo format"
    required: true
  checkout_ref:
    description: "Git ref to check out (typically the PR head SHA)"
    required: true
  github_token:
    description: "GitHub token for API access"
    required: true
  mode:
    description: "Review mode: 'current' or 'vnext'."
    required: false
    default: "current"

runs:
  using: "composite"
  steps:
    - name: Validate mode input
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
      run: |
        if [[ "$MODE" != "current" && "$MODE" != "vnext" ]]; then
          echo "::error::Invalid mode '${MODE}'. Must be 'current' or 'vnext'."
          exit 1
        fi

    - name: Check out repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        ref: ${{ inputs.checkout_ref }}
        persist-credentials: true

    - name: Log in to Azure
      uses: bitwarden/gh-actions/azure-login@main
      with:
        subscription_id: ${{ inputs.azure_subscription_id }}
        tenant_id: ${{ inputs.azure_tenant_id }}
        client_id: ${{ inputs.azure_client_id }}

    - name: Get Azure Key Vault secrets
      id: get-kv-secrets
      uses: bitwarden/gh-actions/get-keyvault-secrets@main
      with:
        keyvault: gh-org-bitwarden
        secrets: "ANTHROPIC-CODE-REVIEW-API-KEY"

    - name: Log out from Azure
      uses: bitwarden/gh-actions/azure-logout@main

    - name: Retrieve existing PR threads
      id: retrieve-pull-request-threads
      uses: bitwarden/gh-actions/get-pull-request-threads@main
      with:
        token: ${{ inputs.github_token }}
        pr_number: ${{ inputs.pr_number }}
        repository: ${{ inputs.repository }}

    - name: Create PR comment placeholder
      id: create-comment
      uses: bitwarden/gh-actions/update-pr-comment@main
      with:
        token: ${{ inputs.github_token }}
        pr_number: ${{ inputs.pr_number }}
        repository: ${{ inputs.repository }}
        marker_id: bitwarden-code-review
        body: |
          **Claude Code** is reviewing this pull request...

          If this comment does not update with results, check the [Actions log](${{ github.server_url }}/${{ inputs.repository }}/actions/runs/${{ github.run_id }}).

    - name: Review with Claude Code
      uses: anthropics/claude-code-action@bee87b3258c251f9279e5371b0cc3660f37f3f77 # v1.0.83
      with:
        anthropic_api_key: ${{ steps.get-kv-secrets.outputs.ANTHROPIC-CODE-REVIEW-API-KEY }}
        plugin_marketplaces: "https://github.com/bitwarden/ai-plugins.git"
        plugins: |
          bitwarden-code-review@bitwarden-marketplace
          bitwarden-software-engineer@bitwarden-marketplace
          bitwarden-security-engineer@bitwarden-marketplace
        prompt: |
          REPO: ${{ inputs.repository }}
          PR NUMBER: ${{ inputs.pr_number }}
          STICKY COMMENT ID: ${{ steps.create-comment.outputs.comment_id }}

          # RULES

          1. The repository is already checked out at the PR head SHA with full git history (fetch-depth: 0).
          2. You can read files directly and use git commands to inspect changes.
          3. When your review is complete, write your final summary in markdown format to /tmp/review-summary.md.
             This file will be used to update the sticky PR comment automatically.

          /bitwarden-code-review:code-review
        claude_args: |
          --verbose
          --model opus
          --allowedTools "Task,Skill,Read,Write,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(gh pr checks:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr review:--comment*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment"

    - name: Update PR comment with review summary
      if: always()
      uses: bitwarden/gh-actions/update-pr-comment@main
      with:
        token: ${{ inputs.github_token }}
        pr_number: ${{ inputs.pr_number }}
        repository: ${{ inputs.repository }}
        marker_id: bitwarden-code-review
        comment_id: ${{ steps.create-comment.outputs.comment_id }}
        body_file: /tmp/review-summary.md
