name: Test api-commit action
on:
  pull_request:
    paths:
      - 'api-commit/**'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Test / ${{ matrix.mode }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        mode:
          - auto-detect
          - auto-detect-with-deletion
          - explicit-files

    steps:
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: true

      - name: Log in to Azure
        uses: bitwarden/gh-actions/azure-login@main
        with:
          subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          client_id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Retrieve api secrets
        id: retrieve-api-secret
        uses: bitwarden/gh-actions/get-keyvault-secrets@main
        with:
          keyvault: gh-org-bitwarden
          secrets: "BW-GHAPP-ID,BW-GHAPP-KEY"

      - name: Generate GH App token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ steps.retrieve-api-secret.outputs.BW-GHAPP-ID }}
          private-key: ${{ steps.retrieve-api-secret.outputs.BW-GHAPP-KEY }}
          owner: ${{ github.repository_owner }}

      - name: Configure git
        run: |
          git config --local user.email "178206702+bw-ghapp[bot]@users.noreply.github.com"
          git config --local user.name "bw-ghapp[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Create isolated test branch
        run: |
          TEST_BRANCH="test/${{ github.run_id }}-${{ matrix.mode }}"
          echo "TEST_BRANCH=$TEST_BRANCH" >> $GITHUB_ENV
          git checkout -b $TEST_BRANCH
          git push origin $TEST_BRANCH

      # ── auto-detect ───────────────────────────────────────────────────────────

      - name: Create file (auto-detect)
        if: matrix.mode == 'auto-detect'
        run: |
          echo "content $(date +%s)" > api-commit-new-file.txt
          git add api-commit-new-file.txt

      # ── auto-detect-with-deletion ─────────────────────────────────────────────

      - name: Create and push file to be deleted (auto-detect-with-deletion)
        if: matrix.mode == 'auto-detect-with-deletion'
        env:
          TEST_BRANCH: ${{ env.TEST_BRANCH }}
        run: |
          git checkout "$TEST_BRANCH"
          echo "content to delete" > api-commit-file-to-delete.txt
          git add api-commit-file-to-delete.txt
          git commit -m "temp: add file to be deleted"
          git push origin HEAD:"$TEST_BRANCH"

      - name: Stage deletion and new file (auto-detect-with-deletion)
        if: matrix.mode == 'auto-detect-with-deletion'
        env:
          TEST_BRANCH: ${{ env.TEST_BRANCH }}
        run: |
          git checkout "$TEST_BRANCH"
          git pull origin "$TEST_BRANCH"
          git rm api-commit-file-to-delete.txt
          echo "content $(date +%s)" > api-commit-deletion-test-file.txt
          git add api-commit-deletion-test-file.txt

      # ── explicit-files ────────────────────────────────────────────────────────

      - name: Create file (explicit-files)
        if: matrix.mode == 'explicit-files'
        run: |
          echo "content $(date +%s)" > api-commit-explicit-file.txt

      # ── run api-commit ────────────────────────────────────────────────────────

      - name: Commit via api-commit (auto-detect)
        if: matrix.mode == 'auto-detect'
        uses: ./api-commit
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: ${{ env.TEST_BRANCH }}
          message: "test: auto-detect commit"

      - name: Commit via api-commit (auto-detect-with-deletion)
        if: matrix.mode == 'auto-detect-with-deletion'
        uses: ./api-commit
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: ${{ env.TEST_BRANCH }}
          message: "test: auto-detect with deletion commit"

      - name: Commit via api-commit (explicit-files)
        if: matrix.mode == 'explicit-files'
        uses: ./api-commit
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: ${{ env.TEST_BRANCH }}
          message: "test: explicit files commit"
          files: api-commit-explicit-file.txt

      # ── verify ────────────────────────────────────────────────────────────────

      - name: Verify commit was made
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TEST_BRANCH: ${{ env.TEST_BRANCH }}
          MATRIX_MODE: ${{ matrix.mode }}
          GH_REPO: ${{ github.repository }}
        run: |
          LATEST_COMMIT=$(gh api repos/"$GH_REPO"/branches/"$TEST_BRANCH" --jq '.commit.sha')
          LATEST_MESSAGE=$(gh api repos/"$GH_REPO"/git/commits/$LATEST_COMMIT --jq '.message')
          echo "Latest commit: $LATEST_COMMIT"
          echo "Latest message: $LATEST_MESSAGE"

          if [[ "$MATRIX_MODE" == "auto-detect" ]]; then
            gh api repos/"$GH_REPO"/contents/api-commit-new-file.txt?ref="$TEST_BRANCH" > /dev/null
            echo "✓ api-commit-new-file.txt exists on branch"
          fi

          if [[ "$MATRIX_MODE" == "auto-detect-with-deletion" ]]; then
            gh api repos/"$GH_REPO"/contents/api-commit-deletion-test-file.txt?ref="$TEST_BRANCH" > /dev/null
            echo "✓ api-commit-deletion-test-file.txt exists on branch"
            if gh api repos/"$GH_REPO"/contents/api-commit-file-to-delete.txt?ref="$TEST_BRANCH" 2>/dev/null; then
              echo "✗ api-commit-file-to-delete.txt still exists — deletion failed"
              exit 1
            else
              echo "✓ api-commit-file-to-delete.txt was deleted"
            fi
          fi

          if [[ "$MATRIX_MODE" == "explicit-files" ]]; then
            gh api repos/"$GH_REPO"/contents/api-commit-explicit-file.txt?ref="$TEST_BRANCH" > /dev/null
            echo "✓ api-commit-explicit-file.txt exists on branch"
          fi

      # ── cleanup ───────────────────────────────────────────────────────────────

      - name: Log out from Azure
        if: always()
        uses: bitwarden/gh-actions/azure-logout@main

      - name: Delete test branch
        if: always()
        run: |
          TEST_BRANCH="test/${{ github.run_id }}-${{ matrix.mode }}"
          git push origin --delete $TEST_BRANCH || echo "Branch $TEST_BRANCH already deleted or never created"