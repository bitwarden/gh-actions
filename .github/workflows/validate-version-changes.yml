name: Validate Version Workflow Changes
run-name: Testing _version.yml modifications

on:
  workflow_dispatch:
  push:
    branches:
      - bre-1706/update-version-workflow

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  call-version-workflow:
    name: Call Version Workflow
    uses: ./.github/workflows/_version.yml
    permissions:
      contents: read
      pull-requests: read
      issues: read
    with:
      is-release: false

  display-results:
    name: Display Results
    runs-on: ubuntu-22.04
    needs: call-version-workflow
    steps:
      - name: Display calculated version
        env:
          VERSION: ${{ needs.call-version-workflow.outputs.version }}
        run: |
          echo "=========================================="
          echo "Calculated version: $VERSION"
          echo "=========================================="

          if [[ -z "$VERSION" ]]; then
            echo "ERROR: Version output is empty!"
            exit 1
          fi

          echo "SUCCESS: Version workflow completed without errors"
