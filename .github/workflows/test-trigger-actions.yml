name: Test Trigger Actions

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "trigger-actions/**"
      - ".github/workflows/test-trigger-actions.yml"

permissions:
  contents: read

jobs:
  test:
    name: Test Trigger Actions
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      deployments: write
      id-token: write
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run trigger-actions
        id: trigger
        uses: ./trigger-actions
        with:
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          task: test-trigger-actions
          data: '{"test": true}'
          test: "true"
          # The simulate-downstream job (running in parallel) drives this
          # deployment to `success` within ~30-45s. 3 minutes is the safety net.
          monitor-timeout-minutes: "3"

      - name: Verify deployment payload
        id: verify-deployment-payload
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          DEPLOYMENT_ID: ${{ steps.trigger.outputs.deployment-id }}
          EXPECTED_RUN_ID: ${{ github.run_id }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          if [[ -z "$DEPLOYMENT_ID" ]]; then
            echo "::error::trigger-actions did not output deployment-id"
            exit 1
          fi
          echo "deployment-id from composite output: $DEPLOYMENT_ID"

          PAYLOAD=$(gh api "repos/$REPOSITORY/deployments/$DEPLOYMENT_ID" --jq '.payload')

          RUN_ID=$(echo "$PAYLOAD" | jq -r '.run.id')
          RUN_WORKFLOW=$(echo "$PAYLOAD" | jq -r '.run.workflow')
          ARTIFACT_NAME=$(echo "$PAYLOAD" | jq -r '.run.artifact.name')
          GIT_SHA=$(echo "$PAYLOAD" | jq -r '.git.sha')
          GIT_BRANCH=$(echo "$PAYLOAD" | jq -r '.git.branch')
          GIT_OWNER=$(echo "$PAYLOAD" | jq -r '.git.owner')
          GIT_REPO=$(echo "$PAYLOAD" | jq -r '.git.repo')

          check() {
            local field="$1" actual="$2" expected="$3"
            if [[ "$actual" != "$expected" ]]; then
              echo "::error::payload.$field: expected '$expected', got '$actual'"
              exit 1
            fi
            echo "payload.$field: ✓ ($actual)"
          }

          check "run.id" "$RUN_ID" "$EXPECTED_RUN_ID"
          check "run.workflow" "$RUN_WORKFLOW" "test-trigger-actions.yml"

          if [[ ! "$ARTIFACT_NAME" =~ ^trigger-context(-[a-f0-9]+)?$ ]]; then
            echo "::error::payload.run.artifact.name: expected pattern 'trigger-context(-[a-f0-9]+)?', got '$ARTIFACT_NAME'"
            exit 1
          fi
          echo "payload.run.artifact.name: ✓ ($ARTIFACT_NAME)"

          check "git.sha" "$GIT_SHA" "$EXPECTED_SHA"
          check "git.owner" "$GIT_OWNER" "bitwarden"
          check "git.repo" "$GIT_REPO" "gh-actions"

          if [[ -z "$GIT_BRANCH" || "$GIT_BRANCH" == "null" ]]; then
            echo "::error::payload.git.branch is empty"
            exit 1
          fi
          echo "payload.git.branch: ✓ ($GIT_BRANCH)"

          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

      - name: Download trigger context artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ steps.verify-deployment-payload.outputs.artifact_name }}
          path: trigger-context

      - name: Verify trigger context
        run: |
          if [[ ! -f trigger-context/trigger-context.json ]]; then
            echo "::error::trigger-context.json not found in artifact"
            exit 1
          fi

          INPUTS=$(jq -r '.inputs' trigger-context/trigger-context.json)
          if [[ "$INPUTS" == "null" ]]; then
            echo "::error::trigger-context.json missing 'inputs' key"
            exit 1
          fi
          echo "context.inputs: ✓"

          DATA_TEST=$(jq -r '.data.test' trigger-context/trigger-context.json)
          if [[ "$DATA_TEST" != "true" ]]; then
            echo "::error::context.data.test: expected 'true', got '$DATA_TEST'"
            exit 1
          fi
          echo "context.data: ✓"

      - name: Verify in_progress status carried log_url
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          DEPLOYMENT_ID: ${{ steps.trigger.outputs.deployment-id }}
          EXPECTED_LOG_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          LOG_URL=$(gh api "repos/$REPOSITORY/deployments/$DEPLOYMENT_ID/statuses?per_page=100" \
            --jq '[.[] | select(.state == "in_progress") | .log_url | select(. != null and . != "")][0] // empty')
          if [[ "$LOG_URL" != "$EXPECTED_LOG_URL" ]]; then
            echo "::error::in_progress status log_url: expected '$EXPECTED_LOG_URL', got '$LOG_URL'"
            exit 1
          fi
          echo "in_progress log_url: ✓ ($LOG_URL)"

      - name: Cleanup all trigger-actions deployments
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          DEPLOYMENT_IDS=$(gh api "repos/$REPOSITORY/deployments?environment=trigger-actions&per_page=100" \
            --jq '.[].id')

          for ID in $DEPLOYMENT_IDS; do
            gh api "repos/$REPOSITORY/deployments/$ID/statuses" \
              --method POST \
              -f state=inactive
            gh api "repos/$REPOSITORY/deployments/$ID" \
              --method DELETE
            echo "Deleted deployment $ID"
          done

  simulate-downstream:
    name: Simulate Downstream Success
    runs-on: ubuntu-24.04
    permissions:
      deployments: write
    steps:
      - name: Find the deployment created by the test job
        id: find
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # Poll up to 30 times (5s each = 150s budget) for the deployment
          # whose payload.run.id matches the current workflow run.
          for i in $(seq 1 30); do
            DEPLOYMENT_ID=$(gh api \
              "repos/$REPOSITORY/deployments?environment=trigger-actions&task=test-trigger-actions&per_page=30" \
              --jq "[.[] | select(.payload.run.id == ${RUN_ID}) | .id][0] // empty")
            if [[ -n "$DEPLOYMENT_ID" ]]; then
              echo "Found deployment $DEPLOYMENT_ID for run $RUN_ID (after $((i * 5))s)"
              echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Did not find a trigger-actions deployment from run $RUN_ID within 150s"
          exit 1

      - name: Post in_progress status
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          DEPLOYMENT_ID: ${{ steps.find.outputs.deployment_id }}
          # Stand in for the dispatched downstream run URL so the monitor's
          # "Deployment Tracking" summary + log link get exercised.
          LOG_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api "repos/$REPOSITORY/deployments/$DEPLOYMENT_ID/statuses" \
            --method POST \
            -f state=in_progress \
            -f log_url="$LOG_URL" \
            -f description="Simulated: downstream started"
          echo "Posted in_progress (log_url=$LOG_URL) on deployment $DEPLOYMENT_ID"

      - name: Wait so the monitor logs the in_progress status
        run: sleep 15

      - name: Post success status
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          DEPLOYMENT_ID: ${{ steps.find.outputs.deployment_id }}
        run: |
          gh api "repos/$REPOSITORY/deployments/$DEPLOYMENT_ID/statuses" \
            --method POST \
            -f state=success \
            -f description="Simulated: downstream completed"
          echo "Posted success on deployment $DEPLOYMENT_ID"
