name: _version
run-name: Calculate Version

on:
  workflow_call:
    inputs:
      is-release:
        type: boolean
        required: true
      sim_branch:
        type: string
        required: false
        description: "Optional simulated branch name for testing (e.g., version-sim-main-12345)"
    outputs:
      version:
        description: "version to be built"
        value: ${{ jobs.version.outputs.version }}

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.calculate.outputs.version }}
    steps:
      - name: Setup context
        id: setup
        env:
          SIM_BRANCH: ${{ inputs.sim_branch }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          # Set checkout_ref: use sim_branch if provided, otherwise use current ref
          if [[ -n "$SIM_BRANCH" ]]; then
            echo "checkout_ref=$SIM_BRANCH" >> $GITHUB_OUTPUT
            echo "INFO: Test mode - will checkout simulated branch: $SIM_BRANCH"
          else
            echo "checkout_ref=$GITHUB_REF" >> $GITHUB_OUTPUT
            echo "INFO: Production mode - using current ref"
          fi

      - name: Checkout Repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ steps.setup.outputs.checkout_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Determine working SHA
        id: sha
        env:
          SIM_BRANCH: ${{ inputs.sim_branch }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # Set working_sha: use latest SHA from sim_branch if provided, otherwise use github.sha
          if [[ -n "$SIM_BRANCH" ]]; then
            working_sha=$(git rev-parse HEAD)
            echo "INFO: Test mode - using SHA from simulated branch: $working_sha"
          else
            working_sha="$GITHUB_SHA"
            echo "INFO: Production mode - using github.sha: $working_sha"
          fi
          echo "working_sha=$working_sha" >> $GITHUB_OUTPUT

      - name: Get PR ID
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKING_SHA: ${{ steps.sha.outputs.working_sha }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          commit_message=$(gh api "repos/$GITHUB_REPO/commits/$WORKING_SHA" --jq '.commit.message')
          ID=$(echo "$commit_message" | head -1 | grep -o "(#.*)" | grep -o "[0-9]*")
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Get version bump type
        if: ${{ inputs.is-release }}
        id: bump-type
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.id }}
        run: |
          version_tag=$(
            curl -s -L \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/labels" | \
            jq -r '.[].name' | grep "version"
          )

          # Single Version label Enforcement (should go in CI...)
          tag_count=$(wc -w <<<"$version_tag")
          if [[ $tag_count -gt 1 ]]; then
            echo "[!] multiple version labels found!"
            exit 1
          fi

          version_type=$(cut -d ":" -f 2 <<<"$version_tag")

          echo "Version Bump Type: $version_type"
          echo "type=$version_type" >> "$GITHUB_OUTPUT"

      - name: Calculate next version
        id: calculate
        env:
          VERSION_TYPE: ${{ steps.bump-type.outputs.type }}
          PR_ID: ${{ steps.pr.outputs.id }}
        run: |
          echo -e "\nCalculating next version..."

          latest_tag_version=$(git tag --sort=committerdate --list | tail -1)
          latest_version=${latest_tag_version:1}  # remove 'v' from tag version

          if [[ "${{ inputs.is-release }}" == "true" ]]; then
            latest_major_version=$(cut -d "." -f 1 <<<"$latest_version")
            latest_minor_version=$(cut -d "." -f 2 <<<"$latest_version")
            latest_patch_version=$(cut -d "." -f 3 <<<"$latest_version")

            echo "  latest_version:        $latest_version"
            echo "  latest_major_version:  $latest_major_version"
            echo "  latest_minor_version:  $latest_minor_version"
            echo "  latest_patch_version:  $latest_patch_version"

            case "$VERSION_TYPE" in
              major)
                next_version="$((latest_major_version + 1)).0.0"
                ;;
              minor)
                next_version="${latest_major_version}.$((latest_minor_version + 1)).0"
                ;;
              patch)
                next_version="${latest_major_version}.${latest_minor_version}.$((latest_patch_version + 1))"
                ;;
              *)
                next_version="${latest_version}+${PR_ID}"
                ;;
            esac

            echo "Next Version: $next_version"
            echo "version=$next_version" >> "$GITHUB_OUTPUT"
          else
            echo "version=$latest_version+$PR_ID" >> "$GITHUB_OUTPUT"
          fi
