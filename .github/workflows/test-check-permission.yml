name: Test Check Permission

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/test-check-permission.yml"
      - ".github/workflows/_check-permission.yml"
      - "check-permission/action.yml"

permissions: {}

jobs:
  test-has-permission:
    name: Test user has permission (should pass)
    uses: ./.github/workflows/_check-permission.yml
    with:
      require_permission: read
      failure_mode: fail
    permissions:
      contents: read

  test-fail-mode:
    name: Test fail mode without permission (should fail)
    uses: ./.github/workflows/_check-permission.yml
    with:
      require_permission: admin
      failure_mode: fail
    permissions:
      contents: read

  test-skip-mode:
    name: Test skip mode without permission (should pass)
    uses: ./.github/workflows/_check-permission.yml
    with:
      require_permission: admin
      failure_mode: skip
    permissions:
      contents: read

  test-continue-mode:
    name: Test continue mode without permission (should pass)
    uses: ./.github/workflows/_check-permission.yml
    with:
      require_permission: admin
      failure_mode: continue
    permissions:
      contents: read

  validate:
    name: Validate test results
    runs-on: ubuntu-24.04
    needs:
      [test-has-permission, test-fail-mode, test-skip-mode, test-continue-mode]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Check test-has-permission passed
        env:
          RESULT: ${{ needs.test-has-permission.result }}
          HAS_PERM: ${{ needs.test-has-permission.outputs.has_permission }}
          USER_PERM: ${{ needs.test-has-permission.outputs.user_permission }}
          SHOULD_PROCEED: ${{ needs.test-has-permission.outputs.should_proceed }}
        run: |
          echo "Test has permission result: $RESULT"
          echo "  has_permission: $HAS_PERM"
          echo "  user_permission: $USER_PERM"
          echo "  should_proceed: $SHOULD_PROCEED"

          if [[ "$RESULT" == "success" ]]; then
            echo "SUCCESS: Test with sufficient permission passed"
          else
            echo "ERROR: Test with sufficient permission should have passed but got: $RESULT | tee -a $GITHUB_STEP_SUMMARY"
            exit 1
          fi

          if [[ "$HAS_PERM" == "true" && "$SHOULD_PROCEED" == "true" ]]; then
            echo "SUCCESS: Outputs are correct"
          else
            echo "ERROR: Outputs are incorrect | tee -a $GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Check test-fail-mode failed
        env:
          RESULT: ${{ needs.test-fail-mode.result }}
          HAS_PERM: ${{ needs.test-fail-mode.outputs.has_permission }}
          USER_PERM: ${{ needs.test-fail-mode.outputs.user_permission }}
          SHOULD_PROCEED: ${{ needs.test-fail-mode.outputs.should_proceed }}
        run: |
          echo "Test fail mode result: $RESULT"
          echo "  has_permission: $HAS_PERM"
          echo "  user_permission: $USER_PERM"
          echo "  should_proceed: $SHOULD_PROCEED"

          if [[ "$RESULT" == "failure" ]]; then
            echo "SUCCESS: Test with fail mode correctly failed"
          else
            echo "ERROR: Test with fail mode should have failed but got: $RESULT | tee -a $GITHUB_STEP_SUMMARY"
            exit 1
          fi

          if [[ "$HAS_PERM" == "false" && "$SHOULD_PROCEED" == "false" ]]; then
            echo "SUCCESS: Outputs are correct"
          else
            echo "ERROR: Outputs are incorrect"
            exit 1
          fi

      - name: Check test-skip-mode passed
        env:
          RESULT: ${{ needs.test-skip-mode.result }}
          HAS_PERM: ${{ needs.test-skip-mode.outputs.has_permission }}
          USER_PERM: ${{ needs.test-skip-mode.outputs.user_permission }}
          SHOULD_PROCEED: ${{ needs.test-skip-mode.outputs.should_proceed }}
        run: |
          echo "Test skip mode result: $RESULT"
          echo "  has_permission: $HAS_PERM"
          echo "  user_permission: $USER_PERM"
          echo "  should_proceed: $SHOULD_PROCEED"

          if [[ "$RESULT" == "success" ]]; then
            echo "SUCCESS: Test with skip mode passed"
          else
            echo "ERROR: Test with skip mode should have passed but got: $RESULT"
            exit 1
          fi

          if [[ "$HAS_PERM" == "false" && "$SHOULD_PROCEED" == "false" ]]; then
            echo "SUCCESS: Outputs are correct"
          else
            echo "ERROR: Outputs are incorrect"
            exit 1
          fi

      - name: Check test-continue-mode passed
        env:
          RESULT: ${{ needs.test-continue-mode.result }}
          HAS_PERM: ${{ needs.test-continue-mode.outputs.has_permission }}
          USER_PERM: ${{ needs.test-continue-mode.outputs.user_permission }}
          SHOULD_PROCEED: ${{ needs.test-continue-mode.outputs.should_proceed }}
        run: |
          echo "Test continue mode result: $RESULT"
          echo "  has_permission: $HAS_PERM"
          echo "  user_permission: $USER_PERM"
          echo "  should_proceed: $SHOULD_PROCEED"

          if [[ "$RESULT" == "success" ]]; then
            echo "SUCCESS: Test with continue mode passed"
          else
            echo "ERROR: Test with continue mode should have passed but got: $RESULT"
            exit 1
          fi

          if [[ "$HAS_PERM" == "false" && "$SHOULD_PROCEED" == "true" ]]; then
            echo "SUCCESS: Outputs are correct"
          else
            echo "ERROR: Outputs are incorrect"
            exit 1
          fi
