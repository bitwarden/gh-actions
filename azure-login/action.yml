name: "Azure Login"
description: "A composite action to login to Azure"
inputs:
  tenant_id:
    description: "Azure Tentant ID"
    required: true
  client_id:
    description: "Azure Client ID"
    required: true
  subscription_id:
    description: "Azure Subscription ID"
    required: false
    default: ""
  allow_no_subscriptions:
    description: "Allow login without a subscription"
    required: false
    default: "false"
  retry_base_delay:
    description: "Base delay in seconds for exponential backoff between login attempts"
    required: false
    default: "5"
runs:
  using: "composite"
  steps:
    - name: Login to Azure using OIDC (attempt 1)
      id: login_attempt_1
      uses: Azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      continue-on-error: true
      with:
        subscription-id: ${{ inputs.subscription_id }}
        tenant-id: ${{ inputs.tenant_id }}
        client-id: ${{ inputs.client_id }}
        allow-no-subscriptions: ${{ inputs.allow_no_subscriptions }}

    - name: Backoff before attempt 2
      if: steps.login_attempt_1.outcome == 'failure'
      shell: bash
      run: |
        delay=$(( ${{ inputs.retry_base_delay }} * 1 ))
        echo "::warning::Azure login attempt 1 failed. Retrying in ${delay}s..."
        sleep "${delay}"

    - name: Login to Azure using OIDC (attempt 2)
      id: login_attempt_2
      if: steps.login_attempt_1.outcome == 'failure'
      uses: Azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      continue-on-error: true
      with:
        subscription-id: ${{ inputs.subscription_id }}
        tenant-id: ${{ inputs.tenant_id }}
        client-id: ${{ inputs.client_id }}
        allow-no-subscriptions: ${{ inputs.allow_no_subscriptions }}

    - name: Backoff before attempt 3
      if: steps.login_attempt_1.outcome == 'failure' && steps.login_attempt_2.outcome == 'failure'
      shell: bash
      run: |
        delay=$(( ${{ inputs.retry_base_delay }} * 2 ))
        echo "::warning::Azure login attempt 2 failed. Retrying in ${delay}s..."
        sleep "${delay}"

    - name: Login to Azure using OIDC (attempt 3)
      id: login_attempt_3
      if: steps.login_attempt_1.outcome == 'failure' && steps.login_attempt_2.outcome == 'failure'
      uses: Azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        subscription-id: ${{ inputs.subscription_id }}
        tenant-id: ${{ inputs.tenant_id }}
        client-id: ${{ inputs.client_id }}
        allow-no-subscriptions: ${{ inputs.allow_no_subscriptions }}
