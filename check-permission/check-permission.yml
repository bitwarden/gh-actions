---
name: Check Permission

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  check-permission:
    name: Check permission
    uses: bitwarden/gh-actions/.github/workflows/_check-permission.yml@main
    with:
      require_permission: write # Options: admin, write, read, none
      failure_mode: fail # Options: fail, skip, continue
    permissions:
      contents: read

