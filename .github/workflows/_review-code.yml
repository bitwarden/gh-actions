name: Code Review

on:
  workflow_call:
    secrets:
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_CLIENT_ID:
        required: true

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.event.pull_request.number || github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  check-permission:
    name: Check permission
    uses: ./.github/workflows/_check-permission.yml
    with:
      failure_mode: "skip"
      require_permission: "write"
    permissions:
      contents: read

  validation:
    name: Validation
    needs: check-permission
    if: needs.check-permission.outputs.should_proceed == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_review: ${{ steps.validate.outputs.should_review }}
      review_variant: ${{ steps.validate.outputs.review_variant }}

    steps:
      - name: Check review gate
        id: validate
        uses: bitwarden/gh-actions/check-review-gate@main
        with:
          event_name: ${{ github.event.action }}
          marker_id: bitwarden-code-review
          pr_number: ${{ github.event.pull_request.number }}
          repository: ${{ github.repository }}
          token: ${{ github.token }}

  review:
    name: Review
    runs-on: ubuntu-24.04
    needs: [check-permission, validation]
    if: needs.check-permission.outputs.should_proceed == 'true' && needs.validation.outputs.should_review == 'true'
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Run code review
        uses: bitwarden/gh-actions/run-code-review@main
        with:
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          pr_number: ${{ github.event.pull_request.number }}
          repository: ${{ github.repository }}
          checkout_ref: ${{ github.event.pull_request.head.sha }}
          github_token: ${{ github.token }}
          mode: ${{ needs.validation.outputs.review_variant }}
