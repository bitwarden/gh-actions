name: "Azure Key Vault - Get Secrets"
description: "Get Secrets from Azure Key Vault instance and set as output variables."
inputs:
  keyvault:
    description: "Name of the Azure Key Vault"
    required: true
  secrets:
    description: "Comma-separated list of secret names to retrieve"
    required: true
branding:
  icon: "lock"
  color: "blue"
runs:
  using: "node24"
  main: "dist/index.js"
