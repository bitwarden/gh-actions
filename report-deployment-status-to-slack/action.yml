name: "Report deployment status to Slack"
description: "Report deployment status to Slack"
branding:
  icon: message-circle
  color: blue
inputs:
  project:
    description: "The name of the project."
    required: true
  project_owner:
    description: "The owner/org of the project"
    default: bitwarden
  tag:
    description: "The name of the branch or tag."
    required: true
  commit_sha:
    description: "The SHA of the branch or tag."
    required: true
  db_migration_detected:
    description: "Whether a database migration was detected."
    default: "false"
  environment:
    description: "The name of the environment."
    required: true
  event:
    description: "Deployment event type. One of: start, success, failure, cancelled, no-changes."
    required: true
  url:
    description: "URL of the deployment action run"
    default: ${{ github.event.deployment_status.target_url }}
  slack_webhook_url:
    description: "Slack incoming webhook URL to post the message to."
    required: true

runs:
  using: "composite"
  steps:
    - name: Slack message setup
      id: setup
      shell: bash
      env:
        INPUT_EVENT: ${{ inputs.event }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        INPUT_TAG: ${{ inputs.tag }}
        INPUT_PROJECT: ${{ inputs.project }}
        INPUT_PROJECT_OWNER: ${{ inputs.project_owner }}
        INPUT_URL: ${{ inputs.url }}
        INPUT_COMMIT_SHA: ${{ inputs.commit_sha }}
        INPUT_DB_MIGRATION_DETECTED: ${{ inputs.db_migration_detected }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
      run: |
        set -euo pipefail

        function slack_message_fn () {
          local event="$INPUT_EVENT"
          local environment="$INPUT_ENVIRONMENT"
          local tag="$INPUT_TAG"
          local project="$INPUT_PROJECT"
          local project_owner="$INPUT_PROJECT_OWNER"
          local url="$INPUT_URL"
          local commit_sha="$INPUT_COMMIT_SHA"
          local short_sha="${commit_sha:0:7}"

          # This action can be called from other repositories with external refs/shas, so use the passed in project rather than github.repository
          local repository_url="$GITHUB_SERVER_URL/$project_owner/$project"

          local commit_url="$repository_url/commit/$commit_sha"
          local tag_url="$repository_url/tree/$tag"

          # Slack link format: https://api.slack.com/reference/surfaces/formatting
          local commit_link="<$commit_url|$short_sha>"
          local tag_link="<$tag_url|$tag>"

          case "$event" in
            start)
              SLACK_MESSAGE=$(printf ':loading: Deploying %s to %s on %s.\n%s\nSHA: %s' "$tag_link" "$environment" "$project" "$url" "$commit_link")
              ;;

            success)
              SLACK_MESSAGE=$(printf ':white_check_mark: Deployed %s to %s on %s.\n%s\nSHA: %s' "$tag_link" "$environment" "$project" "$url" "$commit_link")
              ;;

            failure)
              SLACK_MESSAGE=$(printf ':x: Failed to deploy %s to %s on %s.\n%s\nSHA: %s\nPlease retry. If the issue persists, share this message in the #team-eng-bre channel for support.' "$tag_link" "$environment" "$project" "$url" "$commit_link")
              ;;

            cancelled)
              SLACK_MESSAGE=$(printf ':hand: Cancelled deploy of %s to %s on %s.\n%s\nSHA: %s' "$tag_link" "$environment" "$project" "$url" "$commit_link")
              ;;

            no-changes)
              SLACK_MESSAGE=$(printf ':heavy_minus_sign: No changes were made for %s deployment to %s on %s.\n%s\nSHA: %s' "$tag_link" "$environment" "$project" "$url" "$commit_link")
              ;;

            *)
              echo "::error::Unknown event '$event'. Expected one of: start, success, failure, cancelled, no-changes." >&2
              exit 1
              ;;
          esac
        }

        slack_message_fn

        if [[ "$INPUT_DB_MIGRATION_DETECTED" == "true" && "$INPUT_TAG" != "main" && "$INPUT_TAG" != "rc" && "$INPUT_TAG" != "hotfix-rc" ]]; then
          SLACK_MESSAGE=$(printf '%s\n:red_siren: This branch has new database migration changes.' "$SLACK_MESSAGE")
        fi

        payload=$(jq -nc --arg text "$SLACK_MESSAGE" '{text: $text}')
        echo "payload=$payload" >> "$GITHUB_OUTPUT"

    - name: Post message to a Slack channel
      id: slack-message
      uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
      with:
        webhook: ${{ inputs.slack_webhook_url }}
        webhook-type: incoming-webhook
        payload: ${{ steps.setup.outputs.payload }}
