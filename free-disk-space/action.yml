name: "Free Disk Space"
description: "Remove tools from Linux runners to free disk space"

inputs:
  remove-dotnet:
    description: "Remove .NET tools (~17GB)"
    required: false
    default: "true"
  remove-android:
    description: "Remove Android SDK (~11GB)"
    required: false
    default: "true"
  remove-miniconda:
    description: "Remove Miniconda/Python environments (~3GB)"
    required: false
    default: "true"
  remove-swift:
    description: "Remove Swift toolchain (~1GB)"
    required: false
    default: "true"
  remove-haskell:
    description: "Remove Haskell/GHCup (~1GB)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Free runner disk space
      if: runner.os == 'Linux'
      shell: bash
      env:
        INPUT_REMOVE_DOTNET: ${{ inputs.remove-dotnet }}
        INPUT_REMOVE_ANDROID: ${{ inputs.remove-android }}
        INPUT_REMOVE_MINICONDA: ${{ inputs.remove-miniconda }}
        INPUT_REMOVE_SWIFT: ${{ inputs.remove-swift }}
        INPUT_REMOVE_HASKELL: ${{ inputs.remove-haskell }}
      run: |
        echo "=== Disk space before cleanup ==="
        df -h
        echo ""

        if [ "$INPUT_REMOVE_DOTNET" = "true" ]; then
          echo "Removing .NET tools (~17GB)..."
          sudo rm -rf /usr/share/dotnet
        fi

        if [ "$INPUT_REMOVE_ANDROID" = "true" ]; then
          echo "Removing Android SDK (~11GB)..."
          sudo rm -rf /usr/local/lib/android
        fi

        if [ "$INPUT_REMOVE_MINICONDA" = "true" ]; then
          echo "Removing Miniconda/Python environments (~3GB)..."
          sudo rm -rf /usr/share/miniconda
        fi

        if [ "$INPUT_REMOVE_SWIFT" = "true" ]; then
          echo "Removing Swift toolchain (~1GB)..."
          sudo rm -rf /usr/share/swift
        fi

        if [ "$INPUT_REMOVE_HASKELL" = "true" ]; then
          echo "Removing Haskell/GHCup (~1GB)..."
          sudo rm -rf /usr/local/.ghcup
        fi

        echo ""
        echo "=== Disk space after cleanup ==="
        df -h
