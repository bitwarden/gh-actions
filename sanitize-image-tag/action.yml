name: "Sanitize Image Tag"
description: "Generates a standardized container image tag from a ref, with optional prefix and fork-repo prepending"
author: "Bitwarden"
branding:
  icon: tag
  color: blue

inputs:
  ref:
    description: "Branch or tag reference (use: github.head_ref || github.ref)"
    required: true
  prefix:
    description: "Prefix prepended to the final tag (e.g., 'server-', 'web-'). Include the trailing dash."
    required: false
    default: ""
  fork_repo:
    description: "Fork repository full name (e.g., 'forkuser/repo') when the event is a fork PR. Sanitized and prepended to the tag. Leave empty for non-fork events."
    required: false
    default: ""

outputs:
  tag:
    description: "The generated container image tag"
    value: ${{ steps.generate-tag.outputs.tag }}

runs:
  using: "composite"
  steps:
    - name: Generate container image tag
      id: generate-tag
      shell: bash
      env:
        REF_INPUT: ${{ inputs.ref }}
        PREFIX: ${{ inputs.prefix }}
        FORK_REPO: ${{ inputs.fork_repo }}
      run: |
        if [[ "${REF_INPUT}" == refs/* ]]; then
          BRANCH_NAME=$(sed 's|^refs/heads/||; s|^refs/tags/||' <<< "${REF_INPUT}")
        else
          BRANCH_NAME="${REF_INPUT}"
        fi

        IMAGE_TAG=$(tr '[:upper:]' '[:lower:]' <<< "${BRANCH_NAME}" | sed -E 's/^v//; s/[^a-z0-9._-]+/-/g; s/-+/-/g; s/^[.-]+|[.-]+$//g')

        if [[ -n "${FORK_REPO}" ]]; then
          SANITIZED_REPO=$(tr '[:upper:]' '[:lower:]' <<< "${FORK_REPO}" | sed -E 's/[^a-z0-9._-]+/-/g; s/-+/-/g; s/^[.-]+|[.-]+$//g')
          IMAGE_TAG="${SANITIZED_REPO}-${IMAGE_TAG}"
        fi

        if [[ "${IMAGE_TAG}" == "main" ]]; then
          IMAGE_TAG=dev
        fi

        if [[ -n "${PREFIX}" ]]; then
          IMAGE_TAG="${PREFIX}${IMAGE_TAG}"
        fi

        IMAGE_TAG=$(cut -c1-128 <<< "${IMAGE_TAG}" | sed -E 's/[.-]+$//')

        if [[ -z "${IMAGE_TAG}" ]]; then
          echo "ERROR: Generated IMAGE_TAG is empty from input: ${REF_INPUT}"
          exit 1
        fi

        echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
        echo "Generated container image tag: ${IMAGE_TAG}"
