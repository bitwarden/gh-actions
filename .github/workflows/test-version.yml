name: Test Version workflow

on:
  workflow_dispatch:
  push:
  pull_request:
    paths:
      - ".github/workflows/_version.yml"

permissions: {}

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-24.04
    outputs:
      simulated_main_branch: ${{ steps.create-simulated-branches.outputs.simulated_main_branch }}
      simulated_feature_branch: ${{ steps.create-simulated-branches.outputs.simulated_feature_branch }}
      simulated_pr_number: ${{ steps.create-simulated-branches.outputs.simulated_pr_number }}
      test_tag: ${{ steps.create-simulated-branches.outputs.test_tag }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Create simulated branches
        id: create-simulated-branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          timestamp=$(date +%s)
          simulated_main_branch="version-sim-main-$timestamp"
          simulated_feature_branch="version-sim-feature-$timestamp"

          # Output these early so cleanup can use them if this step fails
          echo "simulated_main_branch=$simulated_main_branch" >> $GITHUB_OUTPUT
          echo "simulated_feature_branch=$simulated_feature_branch" >> $GITHUB_OUTPUT

          # Create simulated main branch with a test tag
          echo "INFO: Creating simulated main branch [$simulated_main_branch]"
          git switch -c "$simulated_main_branch"
          echo 'test main branch' > "version-sim-main-$timestamp.txt"
          git add "version-sim-main-$timestamp.txt"
          git commit -m 'test: simulated main branch'
          git push origin "$simulated_main_branch"

          # Create and push test tag on simulated main
          test_tag="v99.88.${timestamp:0:4}"
          echo "test_tag=$test_tag" >> $GITHUB_OUTPUT
          echo "INFO: Creating test tag [$test_tag] on [$simulated_main_branch]"
          git tag "$test_tag"
          git push origin "$test_tag"

          # Create simulated feature branch
          echo "INFO: Creating simulated feature branch [$simulated_feature_branch]"
          git switch -c "$simulated_feature_branch"
          echo 'test feature' > "version-sim-feature-$timestamp.txt"
          git add "version-sim-feature-$timestamp.txt"
          git commit -m 'test: version calculation'
          git push origin "$simulated_feature_branch"

          # Create version:patch label if it doesn't exist
          if ! gh label list | grep -q "version:patch"; then
            echo "INFO: Creating version:patch label"
            gh label create "version:patch" --description "Patch version increment" --color "0075ca"
          fi

          # Create PR from feature to simulated main
          pr_title='Test version workflow'
          echo "INFO: Creating PR [$pr_title] with base [$simulated_main_branch] and head [$simulated_feature_branch]"
          gh pr create \
            --base "$simulated_main_branch" \
            --head "$simulated_feature_branch" \
            --title "$pr_title" \
            --body "Automated test PR for version workflow testing. This should be cleaned up automatically." \
            --label "version:patch"

          if [[ $? -ne 0 ]]; then
            echo "ERROR: Failed to create PR"
            exit 1
          fi

          simulated_pr_number=$(gh pr view "$simulated_feature_branch" --json number --jq '.number')
          echo "simulated_pr_number=$simulated_pr_number" >> $GITHUB_OUTPUT
          echo "INFO: Created PR #$simulated_pr_number"

          # Switch to simulated main to merge the PR
          git switch "$simulated_main_branch"

          echo "INFO: Merging PR #$simulated_pr_number into [$simulated_main_branch]"
          if ! gh pr merge "$simulated_pr_number" --squash; then
            echo "ERROR: Failed to merge PR #$simulated_pr_number"
            exit 1
          fi

  test-release-version:
    name: Test Release Version
    needs: setup
    uses: ./.github/workflows/_version.yml
    with:
      is-release: true
      sim_branch: ${{ needs.setup.outputs.simulated_main_branch }}
    permissions:
      contents: read
      pull-requests: read
      issues: read

  test-non-release-version:
    name: Test Non-Release Version
    needs: setup
    uses: ./.github/workflows/_version.yml
    with:
      is-release: false
      sim_branch: ${{ needs.setup.outputs.simulated_main_branch }}
    permissions:
      contents: read
      pull-requests: read
      issues: read

  validate:
    name: Validate Outputs
    runs-on: ubuntu-24.04
    needs: [setup, test-release-version, test-non-release-version]
    permissions:
      contents: read
    steps:
      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ needs.test-release-version.outputs.version }}
          TEST_TAG: ${{ needs.setup.outputs.test_tag }}
        run: |
          echo "Release version: $RELEASE_VERSION"
          echo "Test tag: $TEST_TAG"

          if [[ -z "$RELEASE_VERSION" ]]; then
            echo "ERROR: Release version is empty"
            exit 1
          fi

          # Extract version from test tag (remove 'v' prefix)
          base_version="${TEST_TAG:1}"

          # Calculate expected patch increment
          IFS='.' read -ra VERSION_PARTS <<< "$base_version"
          major=${VERSION_PARTS[0]}
          minor=${VERSION_PARTS[1]}
          patch=${VERSION_PARTS[2]}
          expected_version="$major.$minor.$((patch + 1))"

          echo "Expected version: $expected_version (patch increment from $base_version)"

          if [[ "$RELEASE_VERSION" == "$expected_version" ]]; then
            echo "SUCCESS: Release version is correct"
          else
            echo "ERROR: Expected version $expected_version, got $RELEASE_VERSION"
            exit 1
          fi

      - name: Validate non-release version
        env:
          NON_RELEASE_VERSION: ${{ needs.test-non-release-version.outputs.version }}
          PR_NUMBER: ${{ needs.setup.outputs.simulated_pr_number }}
          TEST_TAG: ${{ needs.setup.outputs.test_tag }}
        run: |
          echo "Non-release version: $NON_RELEASE_VERSION"
          echo "PR number: $PR_NUMBER"
          echo "Test tag: $TEST_TAG"

          if [[ -z "$NON_RELEASE_VERSION" ]]; then
            echo "ERROR: Non-release version is empty"
            exit 1
          fi

          # Extract version from test tag (remove 'v' prefix)
          base_version="${TEST_TAG:1}"

          # Should be base_version+PR_NUMBER
          expected="${base_version}+${PR_NUMBER}"
          echo "Expected version: $expected"

          if [[ "$NON_RELEASE_VERSION" == "$expected" ]]; then
            echo "SUCCESS: Non-release version is correct"
          else
            echo "ERROR: Expected version $expected, got $NON_RELEASE_VERSION"
            exit 1
          fi

  cleanup:
    name: Cleanup Test Resources
    runs-on: ubuntu-24.04
    needs: [setup, test-release-version, test-non-release-version, validate]
    if: always()
    env:
      _SIMULATED_MAIN_BRANCH: ${{ needs.setup.outputs.simulated_main_branch }}
      _SIMULATED_FEATURE_BRANCH: ${{ needs.setup.outputs.simulated_feature_branch }}
      _SIMULATED_PR_NUMBER: ${{ needs.setup.outputs.simulated_pr_number }}
      _TEST_TAG: ${{ needs.setup.outputs.test_tag }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: true

      - name: Cleanup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -n $_SIMULATED_PR_NUMBER ]]; then
            pr_state=$(gh pr view "$_SIMULATED_PR_NUMBER" --json state --jq '.state' 2>/dev/null || echo "NOT_FOUND")
            if [[ $pr_state == 'OPEN' ]]; then
              echo "INFO: Closing PR #$_SIMULATED_PR_NUMBER"
              gh pr close "$_SIMULATED_PR_NUMBER" || echo "WARN: Failed to close PR"
            fi
          fi

          if [[ -n $_SIMULATED_FEATURE_BRANCH ]]; then
            if git ls-remote --exit-code --heads origin "$_SIMULATED_FEATURE_BRANCH" >/dev/null 2>&1; then
              echo "INFO: Deleting branch [$_SIMULATED_FEATURE_BRANCH]"
              git push origin --delete "$_SIMULATED_FEATURE_BRANCH" || echo "WARN: Failed to delete branch"
            fi
          fi

          if [[ -n $_SIMULATED_MAIN_BRANCH ]]; then
            if git ls-remote --exit-code --heads origin "$_SIMULATED_MAIN_BRANCH" >/dev/null 2>&1; then
              echo "INFO: Deleting branch [$_SIMULATED_MAIN_BRANCH]"
              git push origin --delete "$_SIMULATED_MAIN_BRANCH" || echo "WARN: Failed to delete branch"
            fi
          fi

          if [[ -n $_TEST_TAG ]]; then
            if git ls-remote --exit-code --tags origin "$_TEST_TAG" >/dev/null 2>&1; then
              echo "INFO: Deleting tag [$_TEST_TAG]"
              git push origin --delete "$_TEST_TAG" || echo "WARN: Failed to delete tag"
            fi
          fi

          echo 'INFO: Cleanup complete'
