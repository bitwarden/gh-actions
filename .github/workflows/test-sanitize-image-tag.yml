name: Test Sanitize Image Tag Action

on:
  pull_request:
    paths:
      - "sanitize-image-tag/**"
      - ".github/workflows/test-sanitize-image-tag.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-basic:
    name: Test basic tag generation
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Main branch to dev
            ref: main
            expected: dev
          - name: RC branch
            ref: rc
            expected: rc
          - name: Hotfix RC branch
            ref: hotfix-rc
            expected: hotfix-rc
          - name: Feature branch with slashes
            ref: feature/add-login
            expected: feature-add-login
          - name: Feature branch with uppercase
            ref: Feature/Add-Login
            expected: feature-add-login
          - name: Feature branch with underscores
            ref: feature/PM-1234_update
            expected: feature-pm-1234_update
          - name: Refs heads prefix
            ref: refs/heads/develop
            expected: develop
          - name: Refs tags prefix
            ref: refs/tags/v2024.12.0
            expected: 2024.12.0
          - name: Version tag
            ref: v1.2.3
            expected: 1.2.3
          - name: Branch with special characters
            ref: feature/test@special#chars
            expected: feature-test-special-chars
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate tag - ${{ matrix.name }}
        id: generate
        uses: ./sanitize-image-tag
        with:
          ref: ${{ matrix.ref }}

      - name: Verify output
        env:
          ACTUAL: ${{ steps.generate.outputs.tag }}
          EXPECTED: ${{ matrix.expected }}
          TEST_NAME: ${{ matrix.name }}
          INPUT_REF: ${{ matrix.ref }}
        run: |
          echo "Test: $TEST_NAME"
          echo "Input: $INPUT_REF"
          echo "Expected: $EXPECTED"
          echo "Actual: $ACTUAL"

          if [[ "$ACTUAL" == "$EXPECTED" ]]; then
            echo "Test passed"
          else
            echo "Test failed: expected '$EXPECTED' but got '$ACTUAL'"
            exit 1
          fi

  test-prefix:
    name: Test prefix prepending
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Server prefix on main
            ref: main
            prefix: "server-"
            expected: server-dev
          - name: Web prefix on rc
            ref: rc
            prefix: "web-"
            expected: web-rc
          - name: Server prefix on feature branch
            ref: feature/foo
            prefix: "server-"
            expected: server-feature-foo
          - name: Prefix preserves main-to-dev mapping
            ref: refs/heads/main
            prefix: "server-"
            expected: server-dev
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate tag - ${{ matrix.name }}
        id: generate
        uses: ./sanitize-image-tag
        with:
          ref: ${{ matrix.ref }}
          prefix: ${{ matrix.prefix }}

      - name: Verify output
        env:
          ACTUAL: ${{ steps.generate.outputs.tag }}
          EXPECTED: ${{ matrix.expected }}
          TEST_NAME: ${{ matrix.name }}
        run: |
          echo "Test: $TEST_NAME"
          echo "Expected: $EXPECTED"
          echo "Actual: $ACTUAL"

          if [[ "$ACTUAL" == "$EXPECTED" ]]; then
            echo "Test passed"
          else
            echo "Test failed: expected '$EXPECTED' but got '$ACTUAL'"
            exit 1
          fi

  test-fork-repo:
    name: Test fork repo prepending
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Fork PR on feature branch
            ref: feature/foo
            fork_repo: bobuser/server
            expected: bobuser-server-feature-foo
          - name: Fork PR on main keeps fork name
            ref: main
            fork_repo: bobuser/server
            expected: bobuser-server-main
          - name: Fork with uppercase repo name
            ref: feature/bar
            fork_repo: BobUser/Server
            expected: bobuser-server-feature-bar
          - name: Fork with prefix
            ref: feature/foo
            prefix: "server-"
            fork_repo: bobuser/server
            expected: server-bobuser-server-feature-foo
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate tag - ${{ matrix.name }}
        id: generate
        uses: ./sanitize-image-tag
        with:
          ref: ${{ matrix.ref }}
          prefix: ${{ matrix.prefix }}
          fork_repo: ${{ matrix.fork_repo }}

      - name: Verify output
        env:
          ACTUAL: ${{ steps.generate.outputs.tag }}
          EXPECTED: ${{ matrix.expected }}
          TEST_NAME: ${{ matrix.name }}
        run: |
          echo "Test: $TEST_NAME"
          echo "Expected: $EXPECTED"
          echo "Actual: $ACTUAL"

          if [[ "$ACTUAL" == "$EXPECTED" ]]; then
            echo "Test passed"
          else
            echo "Test failed: expected '$EXPECTED' but got '$ACTUAL'"
            exit 1
          fi

  test-edge-cases:
    name: Test edge cases
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Multiple consecutive slashes
            ref: feature///multiple-slashes
            expected: feature-multiple-slashes
          - name: Leading and trailing special chars
            ref: -feature-branch-
            expected: feature-branch
          - name: Underscores and dots preserved
            ref: feature_test.version
            expected: feature_test.version
          - name: Mixed special characters
            ref: FE@TUR#/T$ST%BR^NCH
            expected: fe-tur-t-st-br-nch
          - name: Long branch name truncation
            ref: feature/this-is-a-very-long-branch-name-that-exceeds-the-maximum-allowed-length-of-128-characters-for-docker-tags-and-should-be-truncated-properly-without-leaving-trailing-special-chars
            expected: feature-this-is-a-very-long-branch-name-that-exceeds-the-maximum-allowed-length-of-128-characters-for-docker-tags-and-should-be
          - name: Truncation removes trailing dot
            ref: vaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa.xxx
            expected: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate tag - ${{ matrix.name }}
        id: generate
        uses: ./sanitize-image-tag
        with:
          ref: ${{ matrix.ref }}

      - name: Verify output
        env:
          ACTUAL: ${{ steps.generate.outputs.tag }}
          EXPECTED: ${{ matrix.expected }}
          TEST_NAME: ${{ matrix.name }}
          INPUT_REF: ${{ matrix.ref }}
        run: |
          echo "Test: $TEST_NAME"
          echo "Input: $INPUT_REF"
          echo "Expected: $EXPECTED"
          echo "Actual: $ACTUAL"

          if [[ "$ACTUAL" == "$EXPECTED" ]]; then
            echo "Test passed"
          else
            echo "Test failed: expected '$EXPECTED' but got '$ACTUAL'"
            exit 1
          fi
